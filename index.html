<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XuBi Fashion Store - Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #2196F3; --bg: #f5f5f5; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); }
        .app-container { max-width: 450px; margin: 0 auto; background: white; min-height: 100vh; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        
        /* Header & Auth */
        header { padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; position: sticky; top: 0; background: white; z-index: 10; }
        .auth-buttons button { border: none; background: none; color: var(--primary); cursor: pointer; font-weight: bold; }
        
        /* Product Grid */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .card { border: 1px solid #eee; border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; }
        .card img { width: 100%; height: 150px; object-fit: cover; }
        .info { padding: 10px; flex-grow: 1; }
        .price { color: var(--primary); font-weight: bold; }
        .add-btn { width: 100%; background: var(--primary); color: white; border: none; padding: 8px; border-radius: 4px; cursor: pointer; margin-top: 5px; }

        /* Modal Giỏ hàng & Login */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 10px; width: 90%; max-width: 400px; }
        .cart-item { display: flex; justify-content: space-between; margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        
        /* Form Đăng nhập */
        .form-group { margin-bottom: 15px; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .primary-btn { width: 100%; background: var(--primary); color: white; border: none; padding: 12px; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <div class="auth-buttons">
            <button onclick="openModal('loginModal')" id="userDisplay"><i class="fa-user fa"></i> Đăng nhập</button>
        </div>
        <h2 style="margin:0; color: #333;">XuBi</h2>
        <div style="position:relative; cursor:pointer" onclick="openModal('cartModal')">
            <i class="fa-shopping-bag fa-2x" style="color:#555"></i>
            <span id="cart-count" style="position:absolute; top:-5px; right:-10px; background:red; color:white; border-radius:50%; padding:2px 6px; font-size:12px">0</span>
        </div>
    </header>

    <div class="grid" id="product-list">
        </div>
</div>

<div id="loginModal" class="modal">
    <div class="modal-content">
        <h3>Đăng nhập / Đăng ký</h3>
        <div class="form-group"><input type="email" id="email" placeholder="Email"></div>
        <div class="form-group"><input type="password" id="password" placeholder="Mật khẩu"></div>
        <button class="primary-btn" onclick="login()">Xác nhận</button>
        <button onclick="closeModal('loginModal')" style="margin-top:10px; border:none; background:none; width:100%">Đóng</button>
    </div>
</div>

<div id="cartModal" class="modal">
    <div class="modal-content">
        <h3>Giỏ hàng của bạn</h3>
        <div id="cart-items"></div>
        <hr>
        <div style="display:flex; justify-content:space-between; font-weight:bold; margin: 15px 0;">
            <span>Tổng cộng:</span>
            <span id="total-price">0đ</span>
        </div>
        <button class="primary-btn" onclick="checkout()">Thanh toán ngay</button>
        <button onclick="closeModal('cartModal')" style="margin-top:10px; border:none; background:none; width:100%">Tiếp tục mua sắm</button>
    </div>
</div>

<script>
    const products = [
        { id: 1, name: "Đồ bộ ngủ đũi bông mây", price: 70000, img: "https://via.placeholder.com/150" },
        { id: 2, name: "Đầm lông vũ dáng dài", price: 129000, img: "https://via.placeholder.com/150" },
        { id: 3, name: "Đầm Baby Doll", price: 89000, img: "https://via.placeholder.com/150" },
        { id: 4, name: "Đầm Body len cao cấp", price: 105000, img: "https://via.placeholder.com/150" }
    ];

    let cart = JSON.parse(localStorage.getItem('xubi_cart')) || [];

    // Hiển thị sản phẩm
    function renderProducts() {
        const html = products.map(p => `
            <div class="card">
                <img src="${p.img}">
                <div class="info">
                    <div style="font-size:14px; height:40px">${p.name}</div>
                    <div class="price">${p.price.toLocaleString()}đ</div>
                    <button class="add-btn" onclick="addToCart(${p.id})">Thêm</button>
                </div>
            </div>
        `).join('');
        document.getElementById('product-list').innerHTML = html;
    }

    function addToCart(id) {
        const item = products.find(p => p.id === id);
        cart.push(item);
        updateCart();
    }

    function updateCart() {
        localStorage.setItem('xubi_cart', JSON.stringify(cart));
        document.getElementById('cart-count').innerText = cart.length;
        renderCart();
    }

    function renderCart() {
        const cartDiv = document.getElementById('cart-items');
        if (cart.length === 0) {
            cartDiv.innerHTML = "<p>Giỏ hàng trống</p>";
            return;
        }
        cartDiv.innerHTML = cart.map((item, index) => `
            <div class="cart-item">
                <span>${item.name}</span>
                <span>${item.price.toLocaleString()}đ <i class="fa fa-trash" onclick="removeItem(${index})" style="color:red; cursor:pointer"></i></span>
            </div>
        `).join('');
        const total = cart.reduce((sum, item) => sum + item.price, 0);
        document.getElementById('total-price').innerText = total.toLocaleString() + 'đ';
    }

    function removeItem(index) {
        cart.splice(index, 1);
        updateCart();
    }

    function login() {
        const email = document.getElementById('email').value;
        if(email) {
            localStorage.setItem('user', email);
            document.getElementById('userDisplay').innerHTML = `<i class="fa fa-user"></i> Chào, ${email.split('@')[0]}`;
            closeModal('loginModal');
        }
    }

    function checkout() {
        if(!localStorage.getItem('user')) {
            alert("Vui lòng đăng nhập để thanh toán!");
            openModal('loginModal');
            return;
        }
        alert("Cảm ơn bạn đã mua hàng! Đơn hàng đang được xử lý.");
        cart = [];
        updateCart();
        closeModal('cartModal');
    }

    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    // Khởi tạo
    renderProducts();
    updateCart();
</script>

</body>
</html>
